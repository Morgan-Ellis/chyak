<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 핵심: 경로에서 /를 제거했습니다 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>프로 학습러 퀴즈 플래너 v6.9 Final</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --gray: #6c757d; --deck: #f39c12; --folder: #8e44ad; --memo: #f1f4f8; }
        
        /* 모바일 화면 이탈 방지 핵심 설정 */
        * { box-sizing: border-box; } 
        
        body { font-family: -apple-system, "Malgun Gothic", sans-serif; margin: 0; padding: 15px; user-select: none; transition: background-color 0.3s; position: relative; min-height: 100vh; overflow-x: hidden; }
        
        /* [배경] 위장 레이어 */
        body.secret-mode { background-color: #ffffff !important; overflow-y: auto; }
        #secretHeader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; z-index: -1; text-align: left; font-size: 24px; font-weight: 800; color: #000; border-bottom: 2px solid #000; padding-bottom: 15px; letter-spacing: -1px; background: white; }
        body.secret-mode #secretHeader { display: block; }
        
        #secretContentLayer { display: none; position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; color: #333333; font-size: 15px; line-height: 2.2; padding: 40px 20px 200px 20px; z-index: -2; pointer-events: none; text-align: justify; white-space: pre-wrap; }
        body.secret-mode #secretContentLayer { display: block; }

        .container { max-width: 800px; margin: 0 auto; position: relative; transition: opacity 0.2s; width: 100%; }
        .settings-container { position: absolute; top: 0; right: 0; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .btn-settings, .btn-blind { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray); padding: 5px; transition: transform 0.1s; }
        .settings-menu { display: none; position: absolute; top: 45px; right: 0; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 220px; z-index: 1001; }
        
        /* 입력창 그룹 모바일 최적화 */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 16px; } /* 16px 미만은 iOS 자동 줌인 발생함 */
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        #folderContainer { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .folder-wrapper { border-radius: 18px; overflow: hidden; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .folder-header { display: flex; flex-direction: column; background: var(--folder); color: white; padding: 12px; cursor: pointer; min-height: 90px; justify-content: center; align-items: center; text-align: center; }
        .folder-title { font-weight: bold; font-size: 13px; word-break: break-all; }
        .folder-btns { display: flex; gap: 4px; margin-top: 8px; }
        .folder-btn { background: rgba(255,255,255,0.25); border: none; color: white; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .folder-content { display: none; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; width: 100%; }

        .quiz-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 10px 0; }
        .quiz-card { background: white; min-height: 140px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; padding: 15px; position: relative; width: 100%; }
        .quiz-card.is-deck { border: 2px solid var(--deck); background: #fffdf9; }
        .hint-text { font-size: 16px; font-weight: bold; color: #333; line-height: 1.4; word-break: break-all; }
        .card-actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .btn-sm { padding: 6px 10px; font-size: 11px; border-radius: 6px; border: none; color: white; cursor: pointer; flex-grow: 1; text-align: center; }

        #gameOverlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .game-content { width: 100%; max-width: 400px; text-align: center; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* 데스크탑에서 폴더/그리드 확장 */
        @media (min-width: 600px) {
            #folderContainer { grid-template-columns: repeat(3, 1fr); }
            .quiz-grid { grid-template-columns: repeat(2, 1fr); }
            .input-group { flex-direction: row; }
            .btn-add { width: auto; }
        }
    </style>
</head>
<body id="mainBody">

<div id="secretHeader">📰 [단독] 위장 전술 v6.9 Final 업데이트</div>
<div id="secretContentLayer"></div>

<div class="settings-container">
    <button class="btn-blind" onclick="cycleOpacity()">●</button>
    <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
    <div class="settings-menu" id="settingsMenu">
        <div style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 8px;">배경 테마</div>
        <div id="colorPaletteMain" style="display:flex; flex-wrap: wrap; gap:8px; margin-bottom: 12px;"></div>
        <button onclick="addFolder()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#eee; font-weight:bold; font-size:11px;">📁 폴더 추가</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <h2 id="mainTitle">📚 학습 카드</h2>
    <div id="folderContainer"></div>
    
    <!-- 모바일 이탈 해결된 입력 그룹 -->
    <div class="input-group">
        <input type="text" id="hintInput" placeholder="힌트 입력" autocomplete="off">
        <input type="text" id="answerInput" placeholder="정답 입력" autocomplete="off" onkeypress="if(event.key==='Enter') addQuiz()">
        <button class="btn-add" onclick="addQuiz()">등록</button>
    </div>
    
    <div id="mainDropZone" ondragover="event.preventDefault();" ondrop="dropToMain(event)">
        <div id="quizList" class="quiz-grid"></div>
    </div>
</div>

<!-- 게임 오버레이 -->
<div id="gameOverlay">
    <div class="game-content" id="gameContentBox">
        <div style="text-align: right;"><button onclick="closeGame()" style="border:none; background:none; font-size:24px;">✕</button></div>
        <div id="displayHint" style="font-size: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; margin-bottom: 20px; word-break: break-all;"></div>
        <input type="text" id="gameAnswerInput" placeholder="정답 입력..." autocomplete="off" style="width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 12px;">
        
        <div id="defaultActions" style="margin-top:15px;"><button onclick="checkGameAnswer()" style="background:var(--primary); width:100%; padding:15px; color:white; border:none; border-radius:12px; font-weight:bold;">확인 (Enter)</button></div>
        <div id="wrongActions" style="display:none; margin-top:15px;">
            <p id="wrongMsg" style="color:var(--danger); font-weight:bold;"></p>
            <button onclick="showAnswerText()" style="background:var(--gray); width:100%; padding:15px; color:white; border:none; border-radius:12px;">정답 보기</button>
        </div>
        <div id="resultActions" style="display:none; margin-top:20px;">
            <p id="resultMsg" style="font-weight:bold; font-size:18px; color:var(--success);"></p>
            <button id="nextBtn" onclick="nextQuestion()" style="background:var(--success); width:100%; padding:15px; color:white; border:none; border-radius:12px; font-weight:bold;">다음 문제 (Enter)</button>
            <div id="finishOptions" style="display:none; gap:10px; margin-top:10px;">
                <button id="replayBtn" style="background:var(--primary); flex:1; padding:15px; color:white; border:none; border-radius:12px;">다시 풀기</button>
                <button onclick="closeGame()" style="background:#333; flex:1; padding:15px; color:white; border:none; border-radius:12px;">종료</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. PWA 서비스 워커 등록 (경로 수정됨)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW 등록 완료'))
                .catch(err => console.log('SW 등록 실패', err));
        });
    }

    // 데이터 로드
    let quizzes = JSON.parse(localStorage.getItem('v6_main')) || [];
    let folders = JSON.parse(localStorage.getItem('v6_folders')) || [];
    let currentThemeName = localStorage.getItem('v6_theme') || 'gray';
    let currentOpacity = localStorage.getItem('v6_op') || '1.0';
    let currentDensity = localStorage.getItem('v6_density') || '30';
    let isGameActive = false, isResultState = false, currentDeck = [], currentIdxInDeck = 0;

    const fixedThemes = [{name:'gray', h:210, s:15, l:60}, {name:'v-blue', h:215, s:95, l:55}, {name:'v-green', h:145, s:90, l:45}];

    function save() {
        localStorage.setItem('v6_main', JSON.stringify(quizzes));
        localStorage.setItem('v6_folders', JSON.stringify(folders));
        render();
    }

    const getList = (fIdx) => fIdx === null ? quizzes : folders[fIdx].items;

    function render() {
        renderGrid('quizList', quizzes, null);
        const fContainer = document.getElementById('folderContainer');
        fContainer.innerHTML = '';
        folders.forEach((f, fIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'folder-wrapper';
            wrapper.innerHTML = `
                <div class="folder-header" onclick="toggleFolder(${fIdx})" ondragover="event.preventDefault()" ondrop="dropToFolder(event, ${fIdx})">
                    <div class="folder-title">${f.editing ? `<input type="text" id="fIn${fIdx}" value="${f.name}" onkeypress="if(event.key==='Enter') saveFolderName(${fIdx})" style="width:80%">` : `📁 ${f.name} (${f.items.length})`}</div>
                    <div class="folder-btns">
                        <button class="folder-btn" onclick="event.stopPropagation(); ${f.editing ? 'saveFolderName' : 'editFolderName'}(${fIdx})">${f.editing ? '저장' : '편집'}</button>
                        <button class="folder-btn" onclick="event.stopPropagation(); deleteFolder(${fIdx})">삭제</button>
                    </div>
                </div>
                <div class="folder-content" id="fContent${fIdx}" style="display: ${f.isOpen ? 'block' : 'none'}">
                    <div id="fGrid${fIdx}" class="quiz-grid"></div>
                </div>`;
            fContainer.appendChild(wrapper);
            renderGrid(`fGrid${fIdx}`, f.items, fIdx);
        });
    }

    function renderGrid(targetId, data, folderIdx) {
        const el = document.getElementById(targetId); el.innerHTML = '';
        data.forEach((item, idx) => {
            const card = document.createElement('div'); card.className = `quiz-card ${item.isDeck ? 'is-deck' : ''}`;
            card.draggable = true;
            card.ondragstart = (e) => e.dataTransfer.setData('text', JSON.stringify({idx, folderIdx}));
            card.innerHTML = `
                <div class="hint-text">${item.isDeck ? '📦 '+item.hint : '❓ '+item.hint}</div>
                <div class="card-actions">
                    <button class="btn-sm" style="background:var(--success)" onclick="startLearning(${idx}, ${folderIdx})">풀기</button>
                    <button class="btn-sm" style="background:var(--danger)" onclick="deleteItem(${idx}, ${folderIdx})">삭제</button>
                </div>`;
            el.appendChild(card);
        });
    }

    // 문제 풀기 로직
    function startLearning(idx, fIdx) {
        const itm = getList(fIdx)[idx];
        currentDeck = itm.isDeck ? [...itm.cards] : [itm];
        currentIdxInDeck = 0; isGameActive = true;
        document.getElementById('mainContainer').style.visibility = 'hidden';
        showGameStep();
    }

    function showGameStep() {
        isResultState = false;
        const q = currentDeck[currentIdxInDeck];
        document.getElementById('gameOverlay').style.display = 'flex';
        document.getElementById('displayHint').innerText = q.hint;
        const input = document.getElementById('gameAnswerInput');
        input.value = ''; input.disabled = false;
        showActionGroup('default');
        setTimeout(() => input.focus(), 150);
    }

    function checkGameAnswer() {
        const input = document.getElementById('gameAnswerInput');
        if(input.value.trim() === currentDeck[currentIdxInDeck].answer) {
            document.getElementById('resultMsg').innerText = "⭕ 정답입니다!";
            showResultUI();
        } else {
            document.getElementById('wrongMsg').innerText = "❌ 다시 시도해보세요!";
            showActionGroup('wrong');
            input.value = ''; input.focus();
        }
    }

    function showResultUI() { 
        showActionGroup('result'); 
        isResultState = true; 
        document.getElementById('gameAnswerInput').disabled = true; 
    }

    function nextQuestion() {
        if(currentIdxInDeck < currentDeck.length - 1) {
            currentIdxInDeck++;
            showGameStep();
        } else {
            document.getElementById('resultMsg').innerText = "🎊 모든 문제를 완료했습니다!";
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('finishOptions').style.display = 'flex';
        }
    }

    function showActionGroup(t) {
        ['default', 'wrong', 'result'].forEach(g => document.getElementById(g + 'Actions').style.display = (t === g ? 'block' : 'none'));
        document.getElementById('nextBtn').style.display = (t === 'result' ? 'block' : 'none');
    }

    function closeGame() { isGameActive = false; document.getElementById('gameOverlay').style.display = 'none'; document.getElementById('mainContainer').style.visibility = 'visible'; }

    function addQuiz() {
        const h = document.getElementById('hintInput'), a = document.getElementById('answerInput');
        if(!h.value || !a.value) return;
        quizzes.unshift({ hint: h.value, answer: a.value, isDeck: false });
        h.value = ''; a.value = ''; h.focus(); save();
    }

    function addFolder() { folders.push({name: "새 폴더", items: [], isOpen: false, editing: true}); save(); }
    function deleteItem(idx, fIdx) { if(confirm("삭제할까요?")) { getList(fIdx).splice(idx, 1); save(); } }
    function toggleFolder(idx) { folders[idx].isOpen = !folders[idx].isOpen; render(); }
    function deleteFolder(idx) { if(confirm("폴더를 삭제할까요?")) { folders.splice(idx, 1); save(); } }
    function editFolderName(idx) { folders[idx].editing = true; render(); }
    function saveFolderName(idx) { folders[idx].name = document.getElementById(`fIn${idx}`).value || "폴더"; folders[idx].editing = false; save(); }

    function dropToFolder(e, fIdx) {
        e.preventDefault();
        const dragData = JSON.parse(e.dataTransfer.getData('text'));
        if(dragData.folderIdx === fIdx) return;
        const [item] = getList(dragData.folderIdx).splice(dragData.idx, 1);
        folders[fIdx].items.unshift(item);
        save();
    }

    function dropToMain(e) {
        e.preventDefault();
        const dragData = JSON.parse(e.dataTransfer.getData('text'));
        if(dragData.folderIdx === null) return;
        const [item] = getList(dragData.folderIdx).splice(dragData.idx, 1);
        quizzes.unshift(item);
        save();
    }

    // 엔터 키 이벤트 (PWA 앱 경험 핵심)
    window.onkeydown = (e) => {
        if (e.key === 'Enter') {
            if (isGameActive) {
                e.preventDefault();
                if (document.getElementById('finishOptions').style.display === 'flex') closeGame();
                else if (isResultState) nextQuestion();
                else checkGameAnswer();
            }
        }
    };

    function toggleSettings() {
        const m = document.getElementById('settingsMenu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    render();
</script>
</body>
</html>
