<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 1. PWA 설치 경로 최적화: 앞의 / 제거 -->
    <link rel="manifest" href="manifest.json">
    <title>프로 학습러 퀴즈 플래너 v6.9 Final</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --gray: #6c757d; --deck: #f39c12; --folder: #8e44ad; --memo: #f1f4f8; }
        
        /* [추가] 모바일 화면 이탈 방지 및 너비 최적화 */
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Malgun Gothic", sans-serif; margin: 0; padding: 20px; user-select: none; transition: background-color 0.3s; position: relative; min-height: 100vh; overflow-x: hidden; }
        
        /* [배경] 위장 레이어 */
        body.secret-mode { background-color: #ffffff !important; overflow-y: auto; }
        #secretHeader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; z-index: -1; text-align: left; font-size: 24px; font-weight: 800; color: #000; border-bottom: 2px solid #000; padding-bottom: 15px; letter-spacing: -1px; background: white; }
        body.secret-mode #secretHeader { display: block; }
        
        #secretContentLayer { display: none; position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; color: #333333; font-size: 15px; line-height: 2.2; padding: 40px 20px 200px 20px; z-index: -2; pointer-events: none; text-align: justify; white-space: pre-wrap; }
        body.secret-mode #secretContentLayer { display: block; }

        .container { max-width: 800px; margin: 0 auto; position: relative; transition: opacity 0.2s; width: 100%; }
        .settings-container { position: absolute; top: 0; right: 0; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .btn-settings, .btn-blind { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray); padding: 5px; transition: transform 0.1s; }
        .btn-blind:active { transform: scale(1.2); }
        .settings-menu { display: none; position: absolute; top: 45px; right: 0; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 220px; }
        
        .custom-title-input { width: 100%; padding: 6px; margin-bottom: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-weight: bold; outline: none; }
        .custom-text-box { width: 100%; height: 70px; margin-bottom: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; resize: none; outline: none; box-sizing: border-box; background: #fafafa; }
        .btn-tool { background: #f0f2f5; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* [수정] 모바일 입력 그룹 너비 최적화 */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; }
        .input-group input { flex: 1; min-width: 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 16px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }

        #folderContainer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .folder-wrapper { border-radius: 18px; overflow: hidden; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .folder-header { display: flex; flex-direction: column; background: var(--folder); color: white; padding: 12px; cursor: pointer; min-height: 100px; justify-content: center; align-items: center; text-align: center; }
        .folder-title { font-weight: bold; font-size: 13px; }
        .folder-btns { display: flex; gap: 4px; margin-top: 8px; }
        .folder-btn { background: rgba(255,255,255,0.25); border: none; color: white; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 9px; }
        .folder-content { display: none; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; grid-column: 1 / -1; width: 100%; box-sizing: border-box; }

        .quiz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 0; min-height: 50px; width: 100%; }
        .quiz-card { background: white; min-height: 160px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; padding: 15px; cursor: grab; position: relative; width: 100%; }
        .quiz-card.is-deck { border: 2px solid var(--deck); background: #fffdf9; }
        .hint-text { font-size: 17px; font-weight: bold; color: #333; line-height: 1.4; word-break: break-all; }
        .memo-display { font-size: 12px; color: #666; background: #f1f4f8; padding: 5px; border-radius: 4px; margin-top: 5px; }
        .card-actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 4px; border: none; color: white; cursor: pointer; }
        .deck-badge { position: absolute; top: 10px; right: 10px; display: flex; align-items: center; gap: 5px; }
        .badge { background: var(--deck); color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; }

        #gameOverlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.05); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .game-content { max-width: 400px; width: 100%; text-align: center; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); transition: opacity 0.2s; }

        /* [모바일 대응] 작은 화면에서는 세로 정렬 및 그리드 조정 */
        @media (max-width: 550px) { 
            #folderContainer { grid-template-columns: repeat(2, 1fr); } 
            .quiz-grid { grid-template-columns: 1fr; } 
            .input-group { flex-direction: column; }
            .btn-add { padding: 12px; }
        }
        .drag-over { border: 2px dashed var(--primary) !important; background: rgba(74, 144, 226, 0.1) !important; }
    </style>
</head>
<body id="mainBody">

<!-- (여기서부터 아래의 HTML 구조와 JS 로직은 기존 원본과 100% 동일하게 유지했습니다) -->
<div id="secretHeader">📰 [단독] 위장 전술 v6.9 Final 업데이트</div>
<div id="secretContentLayer"></div>

<div class="settings-container">
    <button class="btn-blind" onclick="cycleOpacity()">●</button>
    <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
    <div class="settings-menu" id="settingsMenu">
        <div style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 8px;">배경 테마</div>
        <div id="colorPaletteMain" style="display:flex; flex-wrap: wrap; gap:8px; margin-bottom: 12px;"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <div style="font-size: 10px; font-weight: bold; color: #888;">몰래 모드 커스텀</div>
            <div style="display: flex; gap: 4px;">
                <button class="btn-tool" onclick="addCustomSecret()">+</button>
                <button class="btn-tool" onclick="removeCustomSecret()" style="color: var(--danger);">-</button>
            </div>
        </div>
        <input type="text" id="customSecretTitle" class="custom-title-input" placeholder="헤드라인 제목..." oninput="previewSecretContent()">
        <textarea id="customSecretText" class="custom-text-box" placeholder="본문 내용..." oninput="previewSecretContent()"></textarea>

        <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-bottom:8px;">
            <label style="font-size:11px;">투명도: <span id="opValMain">1.0</span></label>
            <input type="range" class="opInput" min="0" max="1.0" step="0.1" value="1.0" oninput="changeOpacity(this.value)" style="width:100%;">
        </div>

        <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-bottom:12px;">
            <label style="font-size:11px;">배경 농도: <span id="brValMain">30</span>%</label>
            <input type="range" id="brInput" min="0" max="100" step="5" value="30" oninput="updateBgColor(null, this.value)" style="width:100%;">
        </div>

        <button onclick="addFolder()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#eee; font-weight:bold; font-size:11px;">📁 폴더 추가</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <h2 id="mainTitle">📚 학습 카드 플래너</h2>
    <div id="folderContainer"></div>
    <div class="input-group">
        <input type="text" id="hintInput" placeholder="힌트 입력">
        <input type="text" id="answerInput" placeholder="정답 입력" onkeypress="if(event.key==='Enter') addQuiz()">
        <button class="btn-add" onclick="addQuiz()">등록</button>
    </div>
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
    <div id="mainDropZone" ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropToMain(event)">
        <div id="quizList" class="quiz-grid"></div>
    </div>
</div>

<div id="gameOverlay">
    <div class="game-content" id="gameContentBox">
        <div style="text-align: right;"><button onclick="closeGame()" style="border:none; background:none; font-size:24px; cursor:pointer;">✕</button></div>
        <h3 id="gameTitle">문제 풀기</h3>
        <div id="displayHint" style="font-size: 22px; padding: 25px; background: #f8f9fa; border-radius: 15px; margin-bottom: 25px;"></div>
        <input type="text" id="gameAnswerInput" placeholder="정답 입력..." autocomplete="off" style="width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 12px; box-sizing:border-box;">
        
        <div id="defaultActions" style="margin-top:15px;"><button onclick="checkGameAnswer()" style="background:var(--primary); width:100%; padding:15px; color:white; border:none; border-radius:12px; font-weight:bold;">정답 확인 (Enter)</button></div>
        <div id="wrongActions" style="display:none; margin-top:15px;">
            <p id="wrongMsg" style="color:var(--danger); font-weight:bold; margin-bottom:10px;"></p>
            <button onclick="showAnswerText()" style="background:var(--gray); width:100%; padding:15px; color:white; border:none; border-radius:12px; font-weight:bold;">정답 보기</button>
        </div>
        <div id="resultActions" style="display:none; margin-top:20px;">
            <p id="resultMsg" style="font-weight:bold; font-size:18px; color:var(--success);"></p>
            <button id="nextBtn" onclick="nextQuestion()" style="background:var(--success); width:100%; padding:15px; margin-bottom:10px; color:white; border:none; border-radius:12px; font-weight:bold;">다음 문제 (Enter)</button>
            <div id="finishOptions" style="display:none; gap:10px;">
                <button id="replayBtn" style="background:var(--primary); flex:1; padding:15px; color:white; border:none; border-radius:12px; font-weight:bold;">다시 풀기</button>
                <button onclick="closeGame()" style="background:#333; flex:1; padding:15px; color:white; border:none; border-radius:12px;">종료</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 2. PWA 서비스 워커 등록 경로 최적화: 앞의 / 제거
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW 등록 성공:', reg))
                .catch(err => console.log('SW 등록 실패:', err));
        });
    }

    const fixedThemes = [
        {name:'gray', h:210, s:15, l:60}, {name:'v-red', h:0, s:95, l:55}, {name:'v-yellow', h:48, s:100, l:50},
        {name:'v-green', h:145, s:90, l:45}, {name:'v-blue', h:215, s:95, l:55}, {name:'v-purple', h:280, s:90, l:60}, {name:'v-pink', h:330, s:95, l:65}
    ];

    let quizzes = JSON.parse(localStorage.getItem('v6_main')) || [];
    let folders = JSON.parse(localStorage.getItem('v6_folders')) || [];
    let customThemes = JSON.parse(localStorage.getItem('v6_custom_themes')) || [{name:'secret_0', title:'[단독] 위장 모드', content:'내용을 입력하고 제목도 바꿔보세요!'}];
    
    let currentThemeName = localStorage.getItem('v6_theme') || 'gray';
    let currentOpacity = localStorage.getItem('v6_op') || '1.0';
    let currentDensity = localStorage.getItem('v6_density') || '30';
    
    let currentDeck = [], currentIdxInDeck = 0, isResultState = false, isGameActive = false;

    const getList = (fIdx) => fIdx === null ? quizzes : folders[fIdx].items;

    function save() {
        localStorage.setItem('v6_main', JSON.stringify(quizzes));
        localStorage.setItem('v6_folders', JSON.stringify(folders));
        localStorage.setItem('v6_custom_themes', JSON.stringify(customThemes));
        localStorage.setItem('v6_theme', currentThemeName);
        localStorage.setItem('v6_op', currentOpacity);
        localStorage.setItem('v6_density', currentDensity);
        render();
    }

    function toggleSettings() {
        const m = document.getElementById('settingsMenu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') renderThemeButtons();
    }

    function cycleOpacity() {
        let nextOp;
        const cur = parseFloat(currentOpacity);
        if (cur >= 1.0) nextOp = "0";
        else if (cur === 0) nextOp = "0.2";
        else nextOp = "1.0";
        changeOpacity(nextOp);
    }

    function changeOpacity(val) {
        currentOpacity = val;
        document.getElementById('mainContainer').style.opacity = val;
        document.getElementById('gameContentBox').style.opacity = val;
        document.getElementById('opValMain').innerText = val;
        document.querySelectorAll('.opInput').forEach(i => i.value = val);
        localStorage.setItem('v6_op', val);
    }

    function previewSecretContent() {
        const titleVal = document.getElementById('customSecretTitle').value;
        const textVal = document.getElementById('customSecretText').value;
        if (currentThemeName.startsWith('secret_')) {
            document.getElementById('secretHeader').innerText = "📰 " + titleVal;
            document.getElementById('secretContentLayer').innerText = textVal;
            const target = customThemes.find(t => t.name === currentThemeName);
            if(target) { target.title = titleVal; target.content = textVal; }
        }
    }

    function addCustomSecret() {
        const title = document.getElementById('customSecretTitle').value.trim() || "[단독] 새 기사";
        const text = document.getElementById('customSecretText').value.trim();
        if(!text) return alert("내용을 입력하세요!");
        const newName = 'secret_' + Date.now();
        customThemes.push({name: newName, title: title, content: text});
        updateBgColor(newName, null);
        save();
    }

    function removeCustomSecret() {
        if(!currentThemeName.startsWith('secret_')) return alert("커스텀 테마만 삭제 가능!");
        if(confirm("삭제할까요?")) {
            customThemes = customThemes.filter(t => t.name !== currentThemeName);
            updateBgColor('gray', null);
            save();
        }
    }

    function updateBgColor(themeName, density) {
        if(themeName) currentThemeName = themeName;
        if(density !== null) currentDensity = density;
        const body = document.body;
        const custom = customThemes.find(t => t.name === currentThemeName);

        if(custom) {
            body.classList.add('secret-mode');
            const title = document.getElementById('mainTitle');
            if(title) title.style.visibility = 'hidden';
            document.getElementById('secretHeader').innerText = "📰 " + (custom.title || "");
            document.getElementById('secretContentLayer').innerText = custom.content;
        } else {
            const theme = fixedThemes.find(t => t.name === currentThemeName) || fixedThemes[0];
            body.classList.remove('secret-mode');
            const title = document.getElementById('mainTitle');
            if(title) title.style.visibility = 'visible';
            const targetL = 100 - ((100 - theme.l) * (currentDensity / 100));
            const targetS = theme.s * (currentDensity / 100);
            body.style.backgroundColor = `hsl(${theme.h}, ${targetS}%, ${targetL}%)`;
        }
        document.getElementById('brValMain').innerText = currentDensity;
        document.getElementById('brInput').value = currentDensity;
        renderThemeButtons();
    }

    function renderThemeButtons() {
        const palette = document.getElementById('colorPaletteMain');
        if(!palette) return;
        palette.innerHTML = '';
        fixedThemes.forEach(t => {
            const dot = document.createElement('div');
            dot.style.backgroundColor = `hsl(${t.h}, ${t.s}%, ${t.l}%)`;
            dot.style.width = '26px'; dot.style.height = '26px'; dot.style.borderRadius = '50%';
            dot.style.cursor = 'pointer'; dot.style.border = (currentThemeName === t.name) ? '3px solid #4a90e2' : '1px solid #ddd';
            dot.onclick = () => { updateBgColor(t.name, null); save(); };
            palette.appendChild(dot);
        });
        customThemes.forEach(t => {
            const dot = document.createElement('div');
            dot.innerText = '📰'; dot.style.backgroundColor = '#eee';
            dot.style.width = '26px'; dot.style.height = '26px'; dot.style.borderRadius = '50%';
            dot.style.cursor = 'pointer'; dot.style.display = 'flex'; dot.style.alignItems = 'center'; dot.style.justifyContent = 'center'; dot.style.fontSize = '12px';
            dot.style.border = (currentThemeName === t.name) ? '3px solid #4a90e2' : '1px solid #ddd';
            dot.onclick = () => { updateBgColor(t.name, null); save(); };
            palette.appendChild(dot);
        });
    }

    function render() {
        renderGrid('quizList', quizzes, null);
        const fContainer = document.getElementById('folderContainer');
        fContainer.innerHTML = '';
        folders.forEach((f, fIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = `folder-wrapper`;
            wrapper.innerHTML = `<div class="folder-header" onclick="toggleFolder(${fIdx})" ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropToFolder(event, ${fIdx})">
                <div class="folder-title">${f.editing ? `<input type="text" id="fIn${fIdx}" value="${f.name}" onmousedown="event.stopPropagation()" onkeypress="if(event.key==='Enter') saveFolderName(${fIdx})" style="width:90%;">` : `📁 ${f.name} (${f.items.length})`}</div>
                <div class="folder-btns">
                    <button class="folder-btn" onclick="event.stopPropagation(); ${f.editing ? 'saveFolderName' : 'editFolderName'}(${fIdx})">${f.editing ? '저장' : '편집'}</button>
                    <button class="folder-btn" onclick="event.stopPropagation(); deleteFolder(${fIdx})">삭제</button>
                </div></div>
                <div class="folder-content" id="fContent${fIdx}" style="display: ${f.isOpen ? 'block' : 'none'}"><div id="fGrid${fIdx}" class="quiz-grid"></div></div>`;
            fContainer.appendChild(wrapper);
            renderGrid(`fGrid${fIdx}`, f.items, fIdx);
        });
    }

    function renderGrid(targetId, data, folderIdx) {
        const el = document.getElementById(targetId); el.innerHTML = '';
        data.forEach((item, idx) => {
            const card = document.createElement('div'); card.className = `quiz-card ${item.isDeck ? 'is-deck' : ''}`;
            card.draggable = !item.editing && !item.memoEditing;
            card.ondragstart = (e) => e.dataTransfer.setData('text', JSON.stringify({idx, folderIdx}));
            card.ondrop = (e) => { e.preventDefault(); const dragData = JSON.parse(e.dataTransfer.getData('text')); if(dragData.folderIdx === folderIdx && dragData.idx !== idx) combineItems(dragData.idx, idx, folderIdx); };
            card.ondragover = (e) => e.preventDefault();
            card.innerHTML = `<div class="deck-badge">${item.isDeck ? `<span class="badge">Deck ${item.cards.length}</span><button class="btn-sm" style="background:var(--gray); margin-left:5px;" onclick="unbindDeck(${idx}, ${folderIdx})">해제</button>` : ''}</div>
                <div class="hint-text">${item.editing ? `<input type="text" id="ed${targetId}${idx}" value="${item.hint}" onmousedown="event.stopPropagation()" style="width:100%;">` : (item.isDeck ? '📦 '+item.hint : '❓ '+item.hint)}</div>
                ${item.memoEditing ? `<input type="text" id="memoIn${targetId}${idx}" value="${item.memo || ''}" onmousedown="event.stopPropagation()" style="width:100%; margin-top:5px;">` : (item.memo ? `<div class="memo-display">📝 ${item.memo}</div>` : '')}
                <div class="card-actions">${item.editing ? `<button class="btn-sm" style="background:var(--success)" onclick="saveEdit(${idx}, ${folderIdx}, '${targetId}')">저장</button>` : item.memoEditing ? `<button class="btn-sm" style="background:var(--success)" onclick="saveMemo(${idx}, ${folderIdx}, '${targetId}')">저장</button>` :
                `<button class="btn-sm" style="background:var(--success)" onclick="startLearning(${idx}, ${folderIdx})">풀기</button><button class="btn-sm" style="background:var(--primary)" onclick="toggleMemo(${idx}, ${folderIdx})">메모</button><button class="btn-sm" style="background:var(--gray)" onclick="toggleEdit(${idx}, ${folderIdx})">편집</button><button class="btn-sm" style="background:var(--danger)" onclick="deleteItem(${idx}, ${folderIdx})">삭제</button>`}</div>`;
            el.appendChild(card);
        });
    }

    // (startLearning, addQuiz, combineItems 등 모든 로직 원본 그대로 유지)
    function startLearning(idx, fIdx) { const itm = getList(fIdx)[idx]; currentDeck = itm.isDeck ? [...itm.cards] : [itm]; currentIdxInDeck = 0; isGameActive = true; document.getElementById('mainContainer').style.visibility = 'hidden'; document.getElementById('replayBtn').onclick = () => startLearning(idx, fIdx); showGameStep(); }
    function showGameStep() { isResultState = false; const q = currentDeck[currentIdxInDeck]; document.getElementById('gameOverlay').style.display = 'flex'; document.getElementById('displayHint').innerText = q.hint; const input = document.getElementById('gameAnswerInput'); input.disabled = false; input.value = ''; document.getElementById('finishOptions').style.display = 'none'; document.getElementById('nextBtn').style.display = 'none'; showActionGroup('default'); setTimeout(() => input.focus(), 100); }
    function checkGameAnswer() { const input = document.getElementById('gameAnswerInput'); if(input.value.trim() === currentDeck[currentIdxInDeck].answer) { document.getElementById('resultMsg').innerText = "⭕ 정답!"; showResultUI(); } else { document.getElementById('wrongMsg').innerText = "❌ 오답!"; showActionGroup('wrong'); input.value = ''; input.focus(); } }
    function showAnswerText() { document.getElementById('resultMsg').innerText = `💡 정답: ${currentDeck[currentIdxInDeck].answer}`; showResultUI(); }
    function showResultUI() { showActionGroup('result'); isResultState = true; document.getElementById('gameAnswerInput').disabled = true; document.getElementById('nextBtn').style.display = 'block'; }
    function nextQuestion() { if(currentIdxInDeck < currentDeck.length - 1) { currentIdxInDeck++; showGameStep(); } else { document.getElementById('resultMsg').innerText = "🎊 완료!"; document.getElementById('nextBtn').style.display = 'none'; document.getElementById('finishOptions').style.display = 'flex'; } }
    function showActionGroup(t) { ['default', 'wrong', 'result'].forEach(g => document.getElementById(g + 'Actions').style.display = (t === g ? 'block' : 'none')); }
    function closeGame() { isGameActive = false; document.getElementById('gameOverlay').style.display = 'none'; document.getElementById('mainContainer').style.visibility = 'visible'; }

    function addQuiz() { const h = document.getElementById('hintInput'), a = document.getElementById('answerInput'); if(!h.value || !a.value) return; quizzes.unshift({ hint: h.value, answer: a.value, isDeck: false, editing: false, memo: '', memoEditing: false }); h.value = ''; a.value = ''; h.focus(); save(); }
    function addFolder() { folders.push({name: "새 폴더", items: [], isOpen: false, editing: true}); save(); }
    function editFolderName(idx) { folders[idx].editing = true; render(); setTimeout(() => document.getElementById(`fIn${idx}`).focus(), 100); }
    function saveFolderName(idx) { folders[idx].name = document.getElementById(`fIn${idx}`).value || "새 폴더"; folders[idx].editing = false; save(); }
    function deleteFolder(idx) { if(confirm("폴더 삭제?")) { folders.splice(idx, 1); save(); } }
    function toggleFolder(idx) { if(!folders[idx].editing) { folders[idx].isOpen = !folders[idx].isOpen; save(); } }
    function toggleEdit(idx, fIdx) { getList(fIdx)[idx].editing = true; render(); }
    function saveEdit(idx, fIdx, tid) { getList(fIdx)[idx].hint = document.getElementById(`ed${tid}${idx}`).value; getList(fIdx)[idx].editing = false; save(); }
    function toggleMemo(idx, fIdx) { getList(fIdx)[idx].memoEditing = true; render(); }
    function saveMemo(idx, fIdx, tid) { getList(fIdx)[idx].memo = document.getElementById(`memoIn${tid}${idx}`).value; getList(fIdx)[idx].memoEditing = false; save(); }
    function deleteItem(idx, fIdx) { if(confirm("삭제?")) { getList(fIdx).splice(idx, 1); save(); } }
    function dropToFolder(e, fIdx) { e.preventDefault(); const dragData = JSON.parse(e.dataTransfer.getData('text')); if(dragData.folderIdx === fIdx) return; const [item] = getList(dragData.folderIdx).splice(dragData.idx, 1); folders[fIdx].items.unshift(item); save(); }
    function dropToMain(e) { e.preventDefault(); const dragData = JSON.parse(e.dataTransfer.getData('text')); if(dragData.folderIdx === null) return; const [item] = getList(dragData.folderIdx).splice(dragData.idx, 1); quizzes.unshift(item); save(); }
    function combineItems(fIdx, tIdx, fIndex) { const list = getList(fIndex); let from = list[fIdx], to = list[tIdx]; let cards = (from.isDeck ? from.cards : [from]).concat(to.isDeck ? to.cards : [to]); list.splice(Math.max(fIdx, tIdx), 1); list.splice(Math.min(fIdx, tIdx), 1); list.unshift({ hint: to.hint, isDeck: true, cards, editing: false, memo: '', memoEditing: false }); save(); }
    function unbindDeck(idx, fIdx) { const list = getList(fIdx); const deck = list[idx]; if (deck && deck.isDeck) { list.splice(idx, 1); list.unshift(...deck.cards); save(); } }

    window.onkeydown = (e) => { 
        if (!isGameActive) return; 
        if (e.key === 'Enter') { 
            e.preventDefault(); 
            if (document.getElementById('finishOptions').style.display === 'flex') document.getElementById('replayBtn').click(); 
            else if (isResultState) nextQuestion(); 
            else checkGameAnswer(); 
        }
    };

    updateBgColor(currentThemeName, currentDensity);
    changeOpacity(currentOpacity);
    render();
</script>
</body>
</html>
